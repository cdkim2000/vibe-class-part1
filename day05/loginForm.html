<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body{
            padding: 0;
            margin: 0;
        }

        .container{
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-form{
            width: 400px;
            height: 350px;
            border: 1px solid black;
            border-radius: 5px;
        }

        .form{
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title{
            text-align: center;
        }

        .loginBtn{
            width: 100%;
            background-color: #1d10db;
            border-radius: 10px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-form">
            <div class="form">
                <form>
                    <span class="title"><h2>로그인</h2></span>
                    <div>
                        <input type="text" id="userID" placeholder="'ID 입력">
                    </div>
                    <div>
                        <input type="password" id="passwd" placeholder="'PASSWORD 입력">
                    </div>
                    <div>
                        <button type="button" class="loginBtn" onclick="login();">로그인</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        function login() {
            const userID = document.getElementById('userID');
            const passwd = document.getElementById('passwd');

            if(userID.value.trim().length === 0) {
                alert('아이디를 입력하십시요.');
                return;
            }

            if(passwd.value.trim().length === 0) {
                alert('패스워드를 입력하십시요.');
                return;
            }

            alert('로그인 되었습니다.');
        }
    </script>
</body>
</html>
