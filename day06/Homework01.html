<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button type="'button" onclick="getValue();">나이입력</button>
    <p id="numbers"></p>

    <script>
        function getValue() {
            const randVal = Math.floor(Math.random() * 20) + 1;  // 1~100 사이 랜덤값
            const pTag = document.querySelector('#numbers');
            pTag.textContent = `나이: ${randVal}`;

            if(randVal >= 18) {
                alert('나이 :' + randVal + ", 성인");
            }else if (randVal >= 13) {
                alert(`나이 : ${randVal}, 청소년`);
            }else {
                alert(`나이 : ${randVal}, 어린이`);
            }
        }
    </script>
</body>
</html>
